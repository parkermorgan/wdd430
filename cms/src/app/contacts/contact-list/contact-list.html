<div class="panel">
  <div class="panel-heading" style="border-bottom: 1px solid #ccc; background-color: #f0f0f0;">
    <div class="row">
      <span class="title pad-left-right">Contacts</span>
    </div>
    <div class="row">
      <div class="input-group pull-left pad-left-right col-xs-7">
        <input 
          type="text" 
          #searchBox
          class="form-control"
          placeholder="Enter a search value"
          (keyup)="search(searchBox.value)">
        <div class="glyphicon glyphicon-search input-group-addon" (click)="search(searchBox.value)"></div>
      </div>
      <div class="pull-right pad-left-right">
        <a class="btn btn-success" [routerLink]="['new']">New Contact</a>
      </div>
    </div>
  </div>
  <div class="panel-body" style="padding: 10px;">
    <div class="list-group">
      <ng-container *ngFor="let contact of (term ? filteredContacts : (contactService.contactListChangedEvent | async))">
        <ng-container *ngIf="contact.group && contact.group.length > 0">
          <cms-contact-item [contact]="contact"></cms-contact-item>
          <ng-container *ngIf="!term">
            <ng-container *ngFor="let member of contact.group">
              <cms-contact-item [contact]="member"></cms-contact-item>
            </ng-container>
          </ng-container>
        </ng-container>

        <ng-container *ngIf="!contact.group || contact.group.length === 0">
          <cms-contact-item [contact]="contact"></cms-contact-item>
        </ng-container>
      </ng-container>
    </div>
  </div>
</div>
